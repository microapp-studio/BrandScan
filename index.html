<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BrandScan AI</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
  <style>
    :root {
      --bg: #0a0a0c;
      --card-bg: rgba(255, 255, 255, 0.04);
      --accent: #d4af37; /* Золотистый винтаж */
      --text: #ffffff;
      --text-muted: #a1a1aa;
      --glass: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 500px; margin: 0 auto; padding: 20px; }

    header { text-align: center; padding: 40px 0 20px; }
    h1 { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin: 0; background: linear-gradient(to right, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .camera-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/5;
      background: #1c1c1f;
      border-radius: 32px;
      overflow: hidden;
      border: 1px solid var(--glass);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    video, img { width: 100%; height: 100%; object-fit: cover; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      background: var(--glass);
      border: 1px solid var(--glass);
      color: white;
      padding: 18px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 16px;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }

    button#analyzeBtn {
      background: white;
      color: black;
      grid-column: span 2;
      margin-top: 10px;
      font-size: 18px;
    }

    .input-group { margin-top: 20px; }
    input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--glass);
      padding: 16px;
      border-radius: 16px;
      color: white;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .result-card {
      display: none;
      background: var(--card-bg);
      border-radius: 32px;
      padding: 24px;
      margin-top: 30px;
      border: 1px solid var(--glass);
    }

    .decision-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 100px;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 15px;
    }

    .buy { background: #22c55e; color: #000; }
    .wait { background: #facc15; color: #000; }
    .skip { background: #ef4444; color: #fff; }

    .price-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin: 20px 0;
    }

    .price-item {
      background: rgba(255,255,255,0.03);
      padding: 15px;
      border-radius: 20px;
    }

    .price-label { color: var(--text-muted); font-size: 12px; margin-bottom: 5px; }
    .price-value { font-weight: 900; font-size: 20px; }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>BrandScan</h1>
      <p style="color: var(--text-muted)">AI-эксперт в вашем кармане</p>
    </header>

    <div class="camera-container">
      <video id="video" autoplay playsinline muted></video>
      <img id="preview" style="display:none">
    </div>

    <div class="controls">
      <button id="captureBtn">Сделать фото</button>
      <label style="display: contents;">
        <button onclick="document.getElementById('fileInput').click()">Галерея</button>
        <input type="file" id="fileInput" hidden accept="image/*">
      </label>
      
      <div class="input-group" style="grid-column: span 2;">
        <input type="number" id="priceInput" placeholder="Цена в секонде, $">
        <input type="text" id="noteInput" placeholder="Доп. детали (бренд, состав)">
      </div>

      <button id="analyzeBtn">Проверить через Gemini</button>
    </div>

    <div id="result" class="result-card">
      <div id="badge" class="decision-badge">Анализ...</div>
      <h2 id="resBrand" style="margin: 0; font-size: 28px;">—</h2>
      <p id="resItem" style="color: var(--text-muted); margin: 5px 0 20px;">—</p>
      
      <div class="price-grid">
        <div class="price-item">
          <div class="price-label">Новая</div>
          <div id="resNew" class="price-value">—</div>
        </div>
        <div class="price-item">
          <div class="price-label">Resale</div>
          <div id="resUsed" class="price-value">—</div>
        </div>
      </div>

      <div style="background: var(--glass); padding: 20px; border-radius: 20px;">
        <div class="price-label">Вердикт</div>
        <div id="resReason" style="line-height: 1.5;">—</div>
      </div>
    </div>
  </div>

  <div id="loader" class="loading-overlay">
    <div style="text-align: center;">
      <div class="spinner"></div>
      <p>Gemini изучает ярлыки...</p>
    </div>
  </div>

  <canvas id="canvas" style="display:none"></canvas>

  <script>
    // Здесь логика переключения камеры и вызова API (аналогично вашему index.html, но с обновленным рендерингом)

    // ... (код JS остался почти таким же, но с привязкой к новым ID)
  </script>
</body>
</html>
